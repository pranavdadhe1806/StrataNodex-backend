name: Docker Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Type Check ────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Type check
        run: npx tsc --noEmit

  # ─── Docker Build Test ────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: stratanodex-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image
        run: |
          docker run -d --name test-api \
            -e DATABASE_URL=postgresql://test \
            -e JWT_SECRET=test_secret \
            -e REDIS_URL=redis://localhost:6379 \
            stratanodex-backend:test
          sleep 5
          docker logs test-api

  # ─── Deploy to Render ──────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$DEPLOY_HOOK"
            echo "Render deploy triggered successfully"
          else
            echo "RENDER_DEPLOY_HOOK not set — skipping deploy"
          fi
