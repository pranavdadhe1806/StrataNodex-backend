name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          response=$(curl -fsS -o /dev/null -w "%{http_code}" https://stratanodex-backend.onrender.com/health)
          if [ "$response" = "200" ]; then
            echo "Service is alive (HTTP $response)"
          else
            echo "Unexpected response: HTTP $response"
            exit 1
          fi
